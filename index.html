<html lang="es">
<head>

    <meta name="mobile-web-app-capable" content="yes">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #235030; --secondary: #88ab75; --accent: #f39c12; 
            --bg: #f0f7f4; --text: #2c3e50; --card-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        body { font-family: 'Poppins', sans-serif; background-color: var(--bg); margin: 0; padding: 0; overflow-x: hidden; -webkit-tap-highlight-color: transparent; width: 100%; height: 100%;}

        /* --- 1. PANTALLA DE INICIO (SPLASH) --- */
        #splash-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: black; z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: opacity 0.5s ease-out; }
        .img-portada { width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0; z-index: 1; opacity: 0.85; }
        
        /* LOGO UNIVERSIDAD */
        #logo-uni-splash { position: absolute; top: 20px; left: 20px; height: 50px; cursor: pointer; z-index: 10; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5)); }

        #intro-video { position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 9998; display: none; background-color: black; }

        .btn-comenzar {
            position: absolute; bottom: 18%; z-index: 2;
            background: var(--accent); color: white; border: none;
            padding: 16px 40px; border-radius: 35px; font-size: 1.3rem; font-weight: 700;
            letter-spacing: 1px; text-transform: uppercase; cursor: pointer;
            animation: latido 2s infinite ease-in-out;
        }
        @keyframes latido { 0% { transform: scale(1); box-shadow: 0 5px 15px rgba(0,0,0,0.4); } 50% { transform: scale(1.08); box-shadow: 0 10px 25px rgba(243, 156, 18, 0.8); } 100% { transform: scale(1); box-shadow: 0 5px 15px rgba(0,0,0,0.4); } }

        /* --- 2. CABECERA LIMPIA --- */
        header { background: var(--primary); color: white; padding: 15px; text-align: center; position: relative; border-bottom-left-radius: 15px; border-bottom-right-radius: 15px; z-index: 1000; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        header h1 { margin: 0; font-size: 1.3rem; padding: 0 40px; }
        
        .btn-hamburguesa { position: absolute; top: 0; right: 0; height: 100%; width: 55px; font-size: 1.8rem; background: none; border: none; color: white; cursor: pointer; z-index: 101; display: flex; justify-content: center; align-items: center; }

        /* --- MENÚ LATERAL (SIDEBAR) --- */
        #side-menu {
            position: fixed; top: 0; right: -300px; width: 280px; height: 100%; background: white; z-index: 2500;
            box-shadow: -5px 0 15px rgba(0,0,0,0.2); transition: right 0.3s ease; display: flex; flex-direction: column; padding-top: 60px;
        }
        #side-menu.abierto { right: 0; }
        .btn-cerrar-menu { position: absolute; top: 15px; right: 20px; font-size: 2.2rem; background: none; border: none; color: var(--primary); cursor: pointer; }
        .side-item { padding: 20px; border-bottom: 1px solid #eee; font-weight: 600; color: var(--primary); font-size: 1.1rem; cursor: pointer; display: flex; align-items: center; gap: 12px; -webkit-tap-highlight-color: rgba(35, 80, 48, 0.1); }
        .side-item:hover { background: #f0f7f4; }
        #menu-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 2499; display: none; }

        /* Pestañas Principales */
        .menu-container { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; padding: 15px; max-width: 600px; margin: 0 auto; }
        .menu-btn { background-color: white; color: var(--primary); border: none; padding: 12px 5px; border-radius: 10px; font-size: 0.9rem; font-weight: 700; box-shadow: var(--card-shadow); cursor: pointer; text-transform: uppercase; }
        .menu-btn.active { background-color: var(--primary); color: white; }

        /* --- 3. FILTROS --- */
        #fauna-tools { max-width: 600px; margin: 0 auto; padding: 0 15px 15px 15px; }
        .filter-pills { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 5px; justify-content: center; }
        .pill-btn { background-color: #e5f2eb; color: var(--primary); border: none; padding: 8px 15px; border-radius: 20px; font-size: 0.8rem; font-weight: 600; white-space: nowrap; cursor: pointer; }
        .pill-btn.active { background-color: var(--accent); color: white; }

        /* --- 4. GRID DE TARJETAS --- */
        .content-section { display: none; padding: 15px; }
        .content-section.active { display: block; }
        .grid-container { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; max-width: 1200px; margin: 0 auto; padding-bottom: 20px; }
        .mini-card { background: white; padding: 10px; border-radius: 15px; text-align: center; box-shadow: var(--card-shadow); cursor: pointer; border: 1px solid #ddd; }
        .img-container { width: 100%; height: 110px; border-radius: 10px; overflow: hidden; background-color: #eee; }
        .mini-card img { width: 100%; height: 100%; object-fit: cover; }
        .mini-card h3 { font-size: 0.85rem; margin: 10px 0 2px; color: var(--primary); font-weight: 700; line-height: 1.2; }

        /* --- 5. MODALES OPTIMIZADOS --- */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: none; z-index: 3000; justify-content: center; align-items: flex-end; background-size: cover; background-position: center; background-color: rgba(0,0,0,0.85); transition: opacity 0.3s ease; }
        .modal-overlay.active { display: flex; }
        .info-box { background-color: white; width: 100%; padding: 25px 20px; border-top-left-radius: 25px; border-top-right-radius: 25px; max-height: 85vh; overflow-y: auto; position: relative; box-shadow: 0 -5px 20px rgba(0,0,0,0.3); }
        .btn-cerrar { position: absolute; top: 15px; right: 15px; background: #e74c3c; color: white; border: none; font-size: 1.2rem; width: 38px; height: 38px; border-radius: 50%; cursor: pointer; display: flex; justify-content: center; align-items: center; z-index: 10; }
        
        .info-box h2 { font-size: 1.35rem; margin: 0 0 5px; color: var(--primary); padding-right: 40px;}
        .info-box h3 { font-size: 0.95rem; margin: 0 0 18px; font-style: italic; color: #666; font-weight: 400;}
        .info-box p { font-size: 0.9rem; line-height: 1.6; color: #333; margin-bottom: 15px; }

        /* --- ACORDEONES INTERACTIVOS (CORREGIDOS) --- */
        .accordion-item { background: #f9f9f9; border-radius: 10px; margin-bottom: 10px; border: 1px solid #ddd; overflow: hidden; }
        /* El header es el que recibe el clic */
        .accordion-header { padding: 15px; color: var(--primary); font-weight: 600; cursor: pointer; display: flex; justify-content: space-between; align-items: center; -webkit-tap-highlight-color: transparent;}
        .accordion-content { padding: 0 15px; display: none; color: #444; font-size: 0.9rem; line-height: 1.5; }
        
        /* Clases activas */
        .accordion-item.active .accordion-header { background-color: #e5f2eb; border-bottom: 1px solid #eee; }
        .accordion-item.active .accordion-content { display: block; padding: 15px; }
        
        .team-list { list-style: none; padding: 0; margin: 10px 0; }
        .team-list li { padding: 10px 0; border-bottom: 1px solid #eee; font-size: 0.95rem; color: #333; }
        .team-subtitle { font-size: 0.8rem; color: var(--accent); font-weight: bold; text-transform: uppercase; margin-bottom: 5px; display: block; }

        /* --- 6. AUDIO --- */
        .audio-container { display: flex; flex-direction: column; gap: 10px; margin: 18px 0; background-color: #f9f9f9; padding: 15px; border-radius: 12px; border: 1px solid #eee; }
        .audio-row { display: flex; gap: 10px; }
        .btn-audio { background-color: var(--secondary); color: white; border: none; padding: 14px; border-radius: 8px; font-weight: 600; cursor: pointer; flex: 1; font-size: 0.9rem; display: flex; justify-content: center; align-items: center; gap: 8px; }
        .btn-pause { background-color: #e74c3c; flex: 0.3; font-size: 1.3rem; padding: 14px 0;} 
        .btn-sound { background-color: var(--accent); }
    </style>
</head>

    <div class="modal-overlay" id="modal-animal" onclick="checkCerrarModal('modal-animal', event)">

    <script>
        // --- ESTADO DE LA APP ---
        let idiomaActual = 'es'; 
        
        // --- 1. LÓGICA DEL VIDEO ---
        var videoIntro = document.getElementById('intro-video');
        var splashScreen = document.getElementById('splash-screen');

        function iniciarConSonido() {
            splashScreen.style.opacity = '0';
            videoIntro.style.display = 'block';
            videoIntro.play().catch(function() { terminarVideo(); });
            setTimeout(function() { splashScreen.style.display = 'none'; }, 500);
            videoIntro.onclick = function() { terminarVideo(); };
        }

        videoIntro.onended = function() { terminarVideo(); };
        function terminarVideo() { videoIntro.pause(); videoIntro.style.display = 'none'; }

        // --- 2. FUNCIONES DEL MENÚ HAMBURGUESA ---
        function abrirMenu() {
            cerrarModal('modal-animal');
            cerrarModal('modal-extra');
            document.getElementById('side-menu').classList.add('abierto');
            document.getElementById('menu-overlay').style.display = 'block';
        }
        function cerrarMenu() {
            document.getElementById('side-menu').classList.remove('abierto');
            document.getElementById('menu-overlay').style.display = 'none';
        }

        // --- 3. BASE DE DATOS BILINGÜE ---
        const baseDatosFauna = [
            { nombre: "OSO ANDINO / JUCUMARI", nom_en: "ANDEAN BEAR", cientifico: "Tremarctos ornatus", img: "oso-frontino-2-1.jpg", desc: "Habita en los bosques nublados de Cotapata y es vital para la dispersión de semillas grandes.<br><br><strong>Dato Curioso:</strong> Es el único oso nativo de Sudamérica. Las manchas claras en su rostro y pecho son únicas en cada individuo.", desc_en: "Inhabits the cloud forests of Cotapata and is vital for dispersing large seeds.<br><br><strong>Fun Fact:</strong> It is the only bear native to South America. The light spots on its face and chest are unique to each individual.", categoria: "mamifero", sonido: "Sonido Oso jukumari.mp3" },
            { nombre: "PUMA", nom_en: "COUGAR", cientifico: "Puma concolor", img: "large (1).jpg", desc: "Gran felino solitario que se adapta tanto a las zonas altas como a la selva baja del parque.<br><br><strong>Dato Curioso:</strong> Tiene el mayor rango de distribución de cualquier mamífero terrestre en América. No puede rugir, pero sí ronronea.", desc_en: "Large solitary feline that adapts to both the highlands and the lowland jungle of the park.<br><br><strong>Fun Fact:</strong> It has the largest range of any terrestrial mammal in the Americas. It cannot roar, but it purrs.", categoria: "mamifero", sonido: "Sonido Puma.mp3" },
            { nombre: "MARIMONO", nom_en: "SPIDER MONKEY", cientifico: "Ateles chamek", img: "ceb06c81-e99b-40fe-8863-b6e7bd666501.jpg", desc: "Primate de hábitos arborícolas que habita en el dosel de los bosques húmedos.<br><br><strong>Dato Curioso:</strong> Carecen de pulgares en sus manos, una adaptación evolutiva para balancearse a gran velocidad.", desc_en: "Arboreal primate inhabiting the canopy of humid forests.<br><br><strong>Fun Fact:</strong> They lack thumbs on their hands, an evolutionary adaptation for swinging at high speeds.", categoria: "mamifero", sonido: "Sonido Marimono.mp3" },
            { nombre: "TARUCA / VENADO ANDINO", nom_en: "TARUCA / ANDEAN DEER", cientifico: "Hippocamelus antisensis", img: "Diseno-sin-titulo-29.jpg", desc: "Ciervo corpulento que vive en grupos familiares en las escarpadas zonas altoandinas.<br><br><strong>Dato Curioso:</strong> Sus pezuñas están adaptadas para trepar rocas resbaladizas.", desc_en: "Stocky deer living in family groups in the steep high Andean areas.<br><br><strong>Fun Fact:</strong> Its hooves are specially adapted to climb slippery rocks.", categoria: "mamifero", sonido: "Sonido Siervos.mp3" },
            { nombre: "CHANCHO DE MONTE", nom_en: "COLLARED PECCARY", cientifico: "Pecari tajacu", img: "chancho de monte 04.jpeg", desc: "Mamífero social que viaja en manadas buscando raíces y frutos caídos.<br><br><strong>Dato Curioso:</strong> Segrega un olor almizclado muy fuerte para comunicarse.", desc_en: "Social mammal that travels in herds looking for roots and fallen fruit.<br><br><strong>Fun Fact:</strong> It secretes a very strong musky odor to communicate with the herd.", categoria: "mamifero", sonido: "Sonido Cancho de monte.mp3" },
            { nombre: "PACARANA", nom_en: "PACARANA", cientifico: "Dinomys branickii", img: "pacarana__dinomys_branickii__no_zoologico_do_parque_ambiental_chico_mendes__rio_branco__.jpg", desc: "Roedor corpulento de movimientos lentos y pelaje marrón con rayas blancas.<br><br><strong>Dato Curioso:</strong> Es el único representante vivo de una antigua familia de roedores gigantes.", desc_en: "Large, slow-moving rodent with brown fur and white stripes.<br><br><strong>Fun Fact:</strong> It is the only living representative of an ancient family of giant rodents.", categoria: "roedor", sonido: "Sonido Pacarana.mp3" },
            { nombre: "JOCHI COLORADO", nom_en: "CENTRAL AMERICAN AGOUTI", cientifico: "Dasyprocta punctata", img: "507178952_9357785367656840_7279397495556188778_n.jpg", desc: "Roedor diurno muy ágil que habita en el sotobosque.<br><br><strong>Dato Curioso:</strong> Entierra semillas pero suele olvidarlas, convirtiéndose en el mejor reforestador.", desc_en: "Agile diurnal rodent inhabiting the understory.<br><br><strong>Fun Fact:</strong> It buries seeds to eat later but often forgets them, becoming the best natural reforester.", categoria: "roedor", sonido: "Sonido Jochi colorado.mp3" },
            { nombre: "MURCIÉLAGO HEMATÓFAGO", nom_en: "VAMPIRE BAT", cientifico: "Desmodus rotundus", img: "muercielago.jpg", desc: "Murciélago que se alimenta exclusivamente de la sangre de mamíferos o aves.<br><br><strong>Dato Curioso:</strong> Su saliva contiene una proteína anticoagulante llamada 'draculina'.", desc_en: "Bat that feeds exclusively on the blood of mammals or birds.<br><br><strong>Fun Fact:</strong> Its saliva contains an anticoagulant protein called 'draculin'.", categoria: "mamifero", sonido: "Sonido Murcielago.mp3" },
            { nombre: "MURCIÉLAGO FRUGÍVORO", nom_en: "FRUIT BAT", cientifico: "Phyllostomus hastatus", img: "large.jpg", desc: "Murciélago esencial para la dispersión de semillas.<br><br><strong>Dato Curioso:</strong> Tienen un sistema de comunicación complejo; cada familia tiene su propio dialecto.", desc_en: "Large bat essential for seed dispersal.<br><br><strong>Fun Fact:</strong> They have a complex communication system; each family has its own dialect.", categoria: "mamifero", sonido: "Sonido Murcielago.mp3" },
            { nombre: "TITI", nom_en: "TAMARIN MONKEY", cientifico: "Saguinus spp.", img: "Portadas-Amazonas-MOno-TITI-LOW.jpg", desc: "Pequeños primates diurnos muy activos.<br><br><strong>Dato Curioso:</strong> Las hembras casi siempre dan a luz gemelos, y los machos asumen el cuidado principal.", desc_en: "Small, very active diurnal primates.<br><br><strong>Fun Fact:</strong> Females almost always give birth to twins, and males take on the primary caregiving.", categoria: "mamifero", sonido: "Sonido Mono Titi.mp3" },
            { nombre: "GATO DE PAJONAL", nom_en: "PAMPAS CAT", cientifico: "Leopardus tigrinus", img: "WhatsApp Image 2026-03-04 at 11.27.04.jpeg", desc: "Pequeños felinos silvestres sumamente esquivos.<br><br><strong>Dato Curioso:</strong> Es considerado el fantasma de los Andes.", desc_en: "Extremely elusive small wild cats.<br><br><strong>Fun Fact:</strong> It is often considered the ghost of the Andes mountains.", categoria: "mamifero", sonido: "Sonido Gato pajonal.mp3" },
            { nombre: "ZORRO ANDINO", nom_en: "ANDEAN FOX", cientifico: "Lycalopex culpaeus", img: "f28cba57-f446-4556-b2ae-5c264a530a9d.jpg", desc: "Cánido adaptable que regula las poblaciones de roedores.<br><br><strong>Dato Curioso:</strong> Genéticamente está más emparentado con los lobos que con los zorros.", desc_en: "Adaptable canid that regulates rodent populations.<br><br><strong>Fun Fact:</strong> Genetically, it is more closely related to wolves than to true foxes.", categoria: "mamifero", sonido: "Sonido Zorro.mp3" },
            { nombre: "TUNQUI", nom_en: "ANDEAN COCK-OF-THE-ROCK", cientifico: "Rupicola peruvianus", img: "TUNKI.jpg", desc: "Ave emblemática de los Yungas. Los machos poseen un plumaje rojo-anaranjado brillante.<br><br><strong>Dato Curioso:</strong> Los machos se reúnen para hacer coreografías y atraer hembras.", desc_en: "Emblematic bird of the Yungas. Males have brilliant orange-red plumage.<br><br><strong>Fun Fact:</strong> Males gather in groups called leks to perform dances and attract females.", categoria: "ave", sonido: "Sonido Tunki.mp3" },
            { nombre: "CÓNDOR ANDINO", nom_en: "ANDEAN CONDOR", cientifico: "Vultur gryphus", img: "8d81c823-abdf-4c04-83fa-002611abb02f.jpg", desc: "Ave carroñera masiva de las cumbres altas.<br><br><strong>Dato Curioso:</strong> Puede planear cientos de kilómetros aprovechando las corrientes térmicas.", desc_en: "Massive scavenging bird of the high peaks.<br><br><strong>Fun Fact:</strong> It can glide for hundreds of kilometers using thermal air currents without flapping.", categoria: "ave", sonido: "Sonido Condor.mp3" },
            { nombre: "GUÁCHARO", nom_en: "OILBIRD", cientifico: "Steatornis caripensis", img: "483359_10150947721041695_493434887_n.jpg", desc: "Habita en cuevas oscuras y sale de noche a buscar frutas.<br><br><strong>Dato Curioso:</strong> Es la única ave nocturna frugívora que usa ecolocalización.", desc_en: "Inhabits dark caves and emerges at night to search for fruit.<br><br><strong>Fun Fact:</strong> It is the only nocturnal fruit-eating bird in the world that uses echolocation.", categoria: "ave", sonido: "Sonido Guácharo.mp3" },

        // --- 5. LÓGICA DE INTERFAZ PRINCIPAL ---
        function mostrarSeccion(id, btn) {
            let secciones = document.querySelectorAll('.content-section');
            for(let i=0; i<secciones.length; i++) secciones[i].classList.remove('active');
            let botones = document.querySelectorAll('.menu-btn');
            for(let j=0; j<botones.length; j++) botones[j].classList.remove('active');
            document.getElementById(id).classList.add('active');
            btn.classList.add('active');
            document.getElementById('fauna-tools').style.display = (id === 'fauna') ? 'block' : 'none';
        }

        function filtrarCategoria(cat, btn) {
            let botones = document.querySelectorAll('.pill-btn');
            for(let k=0; k<botones.length; k++) botones[k].classList.remove('active');
            btn.classList.add('active');
            
            let tarjetas = document.getElementById('grid-fauna').children;
            for (let i=0; i<tarjetas.length; i++) {
                let coincide = (cat === 'todo' || baseDatosFauna[i].categoria === cat) ? 1 : 0;
                tarjetas[i].style.display = (coincide === 1) ? 'block' : 'none';
            }
        }

        // Modales
        function abrirModalAnimal(datos, esFlora) {
            cerrarMenu();
            let overlay = document.getElementById('modal-animal');
            document.getElementById('modal-titulo').innerText = (idiomaActual === 'es') ? datos.nombre : datos.nom_en;
            document.getElementById('modal-cientifico').innerText = datos.cientifico;
            document.getElementById('modal-descripcion').innerHTML = (idiomaActual === 'es') ? datos.desc : datos.desc_en;
            
            overlay.style.backgroundImage = "linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.9)), url('" + datos.img + "')";
            document.getElementById('row-sonido-animal').style.display = (esFlora === 1) ? 'none' : 'flex';
            if(esFlora === 0) document.getElementById('audio-animal').src = datos.sonido;
            
            overlay.classList.add('active');
        }

            cerrarMenu();
            let overlay = document.getElementById('modal-extra');
            let t = textosUI[idiomaActual];
            
            if (tipo === 'guia') {
                document.getElementById('modal-extra-titulo').innerText = t.guiaTitulo;
                document.getElementById('modal-extra-contenido').innerHTML = t.guiaHtml;
            } else if (tipo === 'equipo') {
                document.getElementById('modal-extra-titulo').innerText = t.equipoTitulo;
                document.getElementById('modal-extra-contenido').innerHTML = t.equipoHtml;
            }
            overlay.classList.add('active');
        }

        function cerrarModal(idModal) { 
            let modal = document.getElementById(idModal);
            if(modal) {
                modal.classList.remove('active'); 
                if(idModal === 'modal-animal') {
                    window.speechSynthesis.cancel(); 
                    document.getElementById('audio-animal').pause(); 
                }
            }
        }

        function checkCerrarModal(idModal, e) { if(e.target.id === idModal) cerrarModal(idModal); }
        
        // ¡LA FUNCIÓN CORREGIDA DEL ACORDEÓN!
        function toggleAccordion(h) { 
            h.parentElement.classList.toggle('active'); 
        }

        // Motor de Voz Bilingüe
        function reproducirTTS() { 
            window.speechSynthesis.cancel(); 
            let msg = new SpeechSynthesisUtterance(document.getElementById('modal-descripcion').innerText); 
            msg.lang = (idiomaActual === 'es') ? 'es-MX' : 'en-US'; 
            window.speechSynthesis.speak(msg); 
        }
        function pausarAudio() { window.speechSynthesis.cancel(); }
        function reproducirSonidoAnimal() { document.getElementById('audio-animal').play(); }
        function pausarSonidoAnimal() { document.getElementById('audio-animal').pause(); }

        // --- 6. RENDERIZADO INICIAL ---
        function renderizarTarjetas() {
            let gridFauna = document.getElementById('grid-fauna');
            gridFauna.innerHTML = ''; 
            for(let i = 0; i < baseDatosFauna.length; i++) {
                let f = baseDatosFauna[i];
                let nombrePintar = (idiomaActual === 'es') ? f.nombre : f.nom_en;
                let div = document.createElement('div'); div.className = 'mini-card';
                div.innerHTML = '<div class="img-container"><img src="' + f.img + '"></div><h3>' + nombrePintar + '</h3>';
                div.onclick = function() { abrirModalAnimal(f, 0); }; 
                gridFauna.appendChild(div);
            }

            let gridFlora = document.getElementById('grid-flora');
            gridFlora.innerHTML = '';
            for(let j = 0; j < baseDatosFlora.length; j++) {
                let fl = baseDatosFlora[j];
                let nombrePintar = (idiomaActual === 'es') ? fl.nombre : fl.nom_en;
                let div = document.createElement('div'); div.className = 'mini-card';
                div.innerHTML = '<div class="img-container"><img src="' + fl.img + '"></div><h3>' + nombrePintar + '</h3>';
                div.onclick = function() { abrirModalAnimal(fl, 1); }; 
                gridFlora.appendChild(div);
            }
        }

            renderizarTarjetas();
        };
